<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE Rewards</title>
</head>

<body style="margin:0;font-family:sans-serif;background:#f5f5f5;">

<!-- ================= FIRST SCREEN ================= -->
<div id="mainView" style="padding:16px;">

  <h3 style="text-align:center;">LIVE rewards</h3>

  <div style="color:#777;margin-top:20px;">Available rewards</div>

  <div id="balance" style="font-size:36px;font-weight:700;">
    USD 5,000,000.00
  </div>

  <button id="transferBtn"
    style="width:100%;padding:14px;margin-top:20px;border:none;border-radius:25px;background:#ff2d2d;color:#fff;font-weight:600;">
    Transfer
  </button>

  <button
    style="width:100%;padding:14px;margin-top:10px;border-radius:25px;border:1px solid #ccc;background:#fff;">
    Exchange
  </button>

</div>


<!-- ================= SECOND SCREEN ================= -->
<div id="transferView" style="
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  z-index:100;
  padding:16px;
">

  <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
    <div id="backBtn">←</div>
    <div>Transfer</div>
    <div>?</div>
  </div>

  <input id="usernameInput" placeholder="@Enter TikTok username"
    style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-bottom:14px;"
  >

  <div>
    <div style="color:#777;">Transfer amount</div>
    <div style="font-size:32px;">
      USD <span id="amountDisplay">0</span>
    </div>
  </div>

  <div style="margin-top:10px;">
    Estimated: USD <span id="receiveDisplay">0.00</span>
  </div>

  <button id="goConfirmBtn"
    style="width:100%;margin-top:20px;padding:14px;background:#ff2d2d;color:#fff;border:none;border-radius:25px;">
    Transfer
  </button>

</div>


<!-- ================= THIRD SCREEN (BOTTOM SHEET) ================= -->
<div id="confirmOverlay" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:200;
">

  <div id="sheet" style="
    position:absolute;
    bottom:0;
    width:100%;
    background:#fff;
    border-radius:20px 20px 0 0;
    padding:16px;
  ">

    <div style="text-align:right;" id="closeSheet">X</div>

    <h3>Transfer details</h3>

    <div>Amount: USD <span id="finalAmount"></span></div>
    <div>Fee: USD 30</div>
    <div>Receive: USD <span id="finalReceive"></span></div>

    <button id="confirmBtn"
      style="width:100%;margin-top:20px;padding:14px;background:#ff2d2d;color:#fff;border:none;border-radius:25px;">
      Confirm
    </button>

  </div>

</div>


<!-- ================= FINAL SCREEN ================= -->
<div id="successView" style="
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  z-index:300;
  padding:16px;
">

  <h3>Transfer details</h3>

  <h1 id="successAmount">USD 0</h1>

  <div>Status: Withdrawal complete</div>

  <button id="backHome"
    style="width:100%;margin-top:20px;padding:14px;background:#ff2d2d;color:#fff;border:none;border-radius:25px;">
    Back to Rewards
  </button>

</div>


<!-- ================= SUCCESS BANNER ================= -->
<div id="banner" style="
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  opacity:0;
  transition:0.4s;
">
  Money sent successfully
</div>


<script>

// ===== STATE =====
let balance = 5000000;
let currentAmount = 0;

// ===== ELEMENTS =====
const balanceEl = document.getElementById("balance");
const transferBtn = document.getElementById("transferBtn");
const transferView = document.getElementById("transferView");
const backBtn = document.getElementById("backBtn");

const amountDisplay = document.getElementById("amountDisplay");
const receiveDisplay = document.getElementById("receiveDisplay");

const confirmOverlay = document.getElementById("confirmOverlay");
const goConfirmBtn = document.getElementById("goConfirmBtn");
const confirmBtn = document.getElementById("confirmBtn");
const closeSheet = document.getElementById("closeSheet");

const finalAmount = document.getElementById("finalAmount");
const finalReceive = document.getElementById("finalReceive");

const successView = document.getElementById("successView");
const successAmount = document.getElementById("successAmount");
const backHome = document.getElementById("backHome");

const banner = document.getElementById("banner");

// ===== FUNCTIONS =====
function updateBalance(){
  balanceEl.textContent = "USD " + balance.toLocaleString(undefined,{minimumFractionDigits:2});
}

function showBanner(){
  banner.style.display = "block";
  setTimeout(()=>banner.style.opacity = 1,10);

  setTimeout(()=>{
    banner.style.opacity = 0;
    setTimeout(()=>banner.style.display="none",400);
  },3000);
}

// ===== NAVIGATION =====
transferBtn.onclick = ()=> transferView.style.display = "block";
backBtn.onclick = ()=> transferView.style.display = "none";

goConfirmBtn.onclick = ()=>{
  confirmOverlay.style.display = "block";
  finalAmount.textContent = currentAmount.toLocaleString();
  finalReceive.textContent = (currentAmount-30).toLocaleString();
};

closeSheet.onclick = ()=> confirmOverlay.style.display = "none";

confirmOverlay.onclick = (e)=>{
  if(e.target === confirmOverlay){
    confirmOverlay.style.display = "none";
  }
};

// ===== CONFIRM =====
confirmBtn.onclick = ()=>{
  confirmOverlay.style.display = "none";
  transferView.style.display = "none";
  successView.style.display = "block";

  successAmount.textContent = "USD " + currentAmount.toLocaleString();

  balance -= currentAmount;
  updateBalance();

  showBanner();
};

// ===== BACK HOME =====
backHome.onclick = ()=>{
  successView.style.display = "none";
};

// ===== FAKE AMOUNT ANIMATION =====
setInterval(()=>{
  if(transferView.style.display === "block"){
    currentAmount += Math.floor(Math.random()*5000)+1000;

    amountDisplay.textContent = currentAmount.toLocaleString();

    let received = currentAmount - 30;
    if(received < 0) received = 0;

    receiveDisplay.textContent = received.toLocaleString(undefined,{
      minimumFractionDigits:2
    });
  }
},800);

// INIT
updateBalance();

</script>

</body>
</html>
