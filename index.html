<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE Rewards</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#fff;
  color:#111;
}

.app{
  max-width:380px;
  margin:0 auto;
  padding:16px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.header-title{
  font-weight:600;
  font-size:17px;
}

/* SUCCESS BANNER */
.banner{
  display:none;
  background:#f5f5f5;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:10px;
  opacity:0;
  transition:opacity .4s;
}

/* BALANCE */
.balance-label{
  font-size:13px;
  color:#777;
}

.balance{
  font-size:34px;
  font-weight:700;
  margin:6px 0 14px;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  font-weight:600;
  font-size:15px;
  margin-bottom:10px;
}

.transfer{
  background:#ff2d2d;
  color:#fff;
}

.exchange{
  background:#fff;
  border:1px solid #ddd;
}

/* TRANSACTIONS */
.tx-list{
  margin-top:10px;
}

.tx{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.tx .left{
  display:flex;
  flex-direction:column;
}

.tx .user{
  font-weight:500;
}

.tx .time{
  font-size:12px;
  color:#888;
}

.tx .amount{
  font-weight:600;
}

.out{ color:#111; }
.in{ color:#111; }

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div>←</div>
    <div class="header-title">LIVE rewards</div>
    <div>•••</div>
  </div>

  <div id="banner" class="banner"></div>

  <div class="balance-label">Available rewards</div>
  <div id="balance" class="balance">USD 5,000,000.00</div>

  <button class="btn transfer" id="transferBtn">Transfer</button>
  <button class="btn exchange">Exchange</button>

  <div class="tx-list" id="txList"></div>

</div>

<script>
let balance = 5000000;
const balanceEl = document.getElementById("balance");
const txList = document.getElementById("txList");
const banner = document.getElementById("banner");

/* FORMAT */
function format(num){
  return num.toLocaleString(undefined,{minimumFractionDigits:2});
}

/* UPDATE BALANCE */
function updateBalance(){
  balanceEl.textContent = "USD " + format(balance);
}

/* CREATE TRANSACTION */
function createTx(type, amount, user){
  const el = document.createElement("div");
  el.className = "tx";

  const time = new Date().toLocaleTimeString();

  el.innerHTML = `
    <div class="left">
      <div class="user">${type === "out" ? "Transfer to" : "Received from"} @${user}</div>
      <div class="time">${time}</div>
    </div>
    <div class="amount ${type}">
      ${type === "out" ? "-" : "+"}USD ${format(amount)}
    </div>
  `;

  txList.prepend(el);
}
<button id="transferBtn" style="
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#ff2d2d;
  color:#fff;
  font-weight:600;
  margin-top:20px;
">
  Transfer
</button>
/* RANDOM USER */
function randomUser(){
  return "user" + Math.floor(Math.random()*9999);
}

/* FAKE ACTIVITY LOOP */
setInterval(()=>{
  const isOut = Math.random() > 0.6;

  let amt = Math.floor(Math.random()*50000)+5000;

  if(isOut && balance > amt){
    balance -= amt;
    createTx("out", amt, randomUser());
  }else{
    balance += amt;
    createTx("in", amt, randomUser());
  }

  updateBalance();

}, 4000);

/* SUCCESS BANNER */
function showBanner(text){
  banner.style.display = "block";
  banner.textContent = text;

  setTimeout(()=>banner.style.opacity = 1,50);

  setTimeout(()=>{
    banner.style.opacity = 0;
    setTimeout(()=>banner.style.display="none",400);
  },3000);
}

/* INITIAL DATA */
for(let i=0;i<5;i++){
  createTx(Math.random()>0.5?"in":"out", Math.floor(Math.random()*30000)+5000, randomUser());
}

updateBalance();
// ===== TRANSFER VIEW LOGIC =====
const transferView = document.getElementById("transferView");
const transferBtn = document.getElementById("transferBtn");
const backBtn = document.getElementById("backBtn");

const amountDisplay = document.getElementById("amountDisplay");
const receiveDisplay = document.getElementById("receiveDisplay");

let currentAmount = 0;

// OPEN TRANSFER
if (transferBtn) {
  transferBtn.addEventListener("click", ()=>{
    transferView.style.display = "block";
  });
}

// CLOSE TRANSFER
if (backBtn) {
  backBtn.addEventListener("click", ()=>{
    transferView.style.display = "none";
  });
}

// TAP OUTSIDE TO CLOSE (simple version)
transferView.addEventListener("click",(e)=>{
  if(e.target === transferView){
    transferView.style.display = "none";
  }
});

// FAKE AMOUNT AUTO-INCREASE (like video)
setInterval(()=>{
  if(transferView.style.display === "block"){
    currentAmount += Math.floor(Math.random()*5000)+1000;

    amountDisplay.textContent = currentAmount.toLocaleString();

    let received = currentAmount - 30;
    if(received < 0) received = 0;

    receiveDisplay.textContent = received.toLocaleString(undefined,{
      minimumFractionDigits:2
    });
  }
}, 800);
</script>
<!-- TRANSFER VIEW -->
<div id="transferView" style="
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  z-index:100;
  padding:16px;
">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div id="backBtn" style="font-size:20px;">←</div>
    <div style="font-weight:600;">Transfer</div>
    <div>?</div>
  </div>

  <!-- Payment method -->
  <div style="font-size:13px;color:#777;margin-bottom:6px;">
    Payment method <span style="float:right;color:#ff2d2d;">Manage</span>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <div style="width:32px;height:32px;border-radius:50%;background:#000;"></div>
    <div style="font-size:14px;">Transfer name (Username Details)</div>
  </div>

  <!-- Username input -->
  <input id="usernameInput" placeholder="@Enter TikTok username"
    style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-bottom:14px;font-size:14px;"
  >

  <!-- Limit -->
  <div style="font-size:12px;color:#777;margin-bottom:14px;">
    Daily transfer limit (Remain/Total)
  </div>

  <!-- Amount -->
  <div style="margin-bottom:10px;">
    <div style="font-size:13px;color:#777;">Transfer amount</div>
    <div style="font-size:32px;font-weight:700;">
      USD <span id="amountDisplay">0</span>
    </div>
  </div>

  <!-- Estimated -->
  <div style="font-size:13px;color:#777;margin-bottom:10px;">
    Estimated amount you receive
    <div style="font-size:18px;color:#111;margin-top:4px;">
      USD <span id="receiveDisplay">0.00</span>
    </div>
  </div>

  <!-- Fee -->
  <div style="font-size:13px;color:#777;margin-bottom:20px;">
    Service fee
    <span style="float:right;">USD 30.00</span>
  </div>

  <!-- Transfer button -->
  <button id="goConfirmBtn"
    style="width:100%;padding:14px;border:none;border-radius:25px;background:#ff2d2d;color:#fff;font-weight:600;">
    Transfer
  </button>

</div>
</body>
</html>
